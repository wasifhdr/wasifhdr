# .github/workflows/metrics.yml
# Generates static SVG stat cards once a day and commits them to your profile repo.
# Because the images are committed files (not live services), they never fail to load.
name: Metrics

on:
  # Rebuild the cards once a day (00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  # Let you trigger a run manually from the Actions tab
  workflow_dispatch:
  # Also rebuild whenever you push to main
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ── Card 1: overview stats + top languages + achievements (replaces the old
      #            stats card, top-languages card, and trophy row) ──────────────
      - name: Stats, languages & achievements
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: wasifhdr
          config_timezone: Asia/Dhaka

          base: header, activity, community, repositories, metadata

          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

      # ── Card 2: isometric 3D contribution calendar (replaces the activity graph) ──
      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: wasifhdr
          config_timezone: Asia/Dhaka
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
