# .github/workflows/metrics.yml
# Generates all profile cards as committed static SVGs once a day.
# Because the images are committed files (not live services), they never fail to load.
name: Metrics

on:
  # Rebuild once a day (00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  # Let you trigger a run manually from the Actions tab
  workflow_dispatch:
  # Also rebuild when you push to main
  push:
    branches: ["main"]

jobs:
  readme-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      # ── Stats card (tokyonight) ──────────────────────────────────────────────
      - name: Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=wasifhdr&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true
          path: stats.svg
          token: ${{ secrets.METRICS_TOKEN }}

      # ── Top languages card (tokyonight) ──────────────────────────────────────
      - name: Top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=wasifhdr&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: top-langs.svg
          token: ${{ secrets.METRICS_TOKEN }}

      # ── Streak card (tokyonight) ─────────────────────────────────────────────
      - name: Streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=wasifhdr&theme=tokyonight&hide_border=true&disable_animations=true
          path: streak.svg
          token: ${{ secrets.METRICS_TOKEN }}

      # ── Commit the three cards above in a single push ────────────────────────
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg streak.svg
          git commit -m "Update README cards [skip ci]" || echo "No changes to commit"
          git push
